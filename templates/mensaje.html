<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Déjanos un mensaje 🐝 — AWS Students Builder</title>
<style>
  :root {
    --aws-navy: #232f3e;
    --aws-orange: #ff9900;
    --miel: #ffc93c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 28px 18px;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #2a3950 0%, #161e2d 100%);
    color: #fff;
    text-align: center;
  }
  h1 { font-size: 26px; }
  h1 span { color: var(--aws-orange); }

  /* --------- abeja con sudadera AWS saludando --------- */
  .abeja-hola { width: 210px; }
  .brazo-saludo {
    animation: saludar 1.1s ease-in-out infinite;
    transform-origin: 138px 120px; /* hombro derecho */
  }
  @keyframes saludar {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(-28deg); }
  }
  .alas-hola {
    animation: aleteo .15s linear infinite alternate;
    transform-origin: 100px 60px;
  }
  @keyframes aleteo { from { transform: scaleY(1);} to { transform: scaleY(.7);} }

  /* --------- formulario --------- */
  form {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 18px;
    padding: 22px;
    backdrop-filter: blur(6px);
  }
  textarea {
    width: 100%;
    height: 96px;
    resize: none;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 12px;
    font-size: 17px;
    font-family: inherit;
    outline: none;
    background: #fffbe9;
    color: var(--aws-navy);
  }
  textarea:focus { border-color: var(--aws-orange); }
  .contador { margin: 8px 0 14px; font-size: 14px; color: #9fb0c3; text-align: right; }
  .contador.limite { color: #ff7b72; font-weight: 700; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--aws-orange);
    color: var(--aws-navy);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
  }
  button:active { transform: scale(.98); }
  button:disabled { opacity: .55; cursor: not-allowed; }

  .aviso {
    max-width: 420px;
    width: 100%;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 15.5px;
    font-weight: 600;
    display: none;
  }
  .aviso.ok    { display: block; background: #10432e; color: #7ee2b8; border: 1px solid #1d7a54; }
  .aviso.error { display: block; background: #4a1d1d; color: #ffb4ad; border: 1px solid #8a3232; }
  footer { font-size: 13px; color: #8296ac; }
</style>
</head>
<body>

  <h1>¡Hola! Somos <span>AWS Students Builder</span> 🐝</h1>

  <!-- Abeja con sudadera de AWS saludando -->
  <svg class="abeja-hola" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
    <!-- alas -->
    <g class="alas-hola">
      <ellipse cx="62" cy="52" rx="30" ry="18" fill="#cfe8ff" opacity=".9" transform="rotate(-25 62 52)"/>
      <ellipse cx="138" cy="52" rx="30" ry="18" fill="#cfe8ff" opacity=".9" transform="rotate(25 138 52)"/>
    </g>
    <!-- antenas -->
    <path d="M85 32 Q78 14 68 8"  stroke="#2b2b2b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="68" cy="8" r="5" fill="#2b2b2b"/>
    <path d="M115 32 Q122 14 132 8" stroke="#2b2b2b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="132" cy="8" r="5" fill="#2b2b2b"/>
    <!-- cabeza -->
    <circle cx="100" cy="62" r="34" fill="#ffc93c"/>
    <circle cx="88" cy="56" r="5.5" fill="#2b2b2b"/>
    <circle cx="112" cy="56" r="5.5" fill="#2b2b2b"/>
    <circle cx="86.5" cy="54" r="1.8" fill="#fff"/>
    <circle cx="110.5" cy="54" r="1.8" fill="#fff"/>
    <path d="M88 72 Q100 82 112 72" stroke="#2b2b2b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="78" cy="68" rx="6" ry="4" fill="#ff9a76" opacity=".6"/>
    <ellipse cx="122" cy="68" rx="6" ry="4" fill="#ff9a76" opacity=".6"/>
    <!-- brazo izquierdo (abajo) -->
    <path d="M66 130 Q46 150 52 168" stroke="#232f3e" stroke-width="16" fill="none" stroke-linecap="round"/>
    <circle cx="52" cy="170" r="9" fill="#ffc93c"/>
    <!-- brazo derecho saludando -->
    <g class="brazo-saludo">
      <path d="M138 122 Q166 108 172 84" stroke="#232f3e" stroke-width="16" fill="none" stroke-linecap="round"/>
      <circle cx="173" cy="80" r="10" fill="#ffc93c"/>
    </g>
    <!-- sudadera (hoodie AWS) -->
    <path d="M60 110 Q100 92 140 110 L148 178 Q100 196 52 178 Z" fill="#232f3e"/>
    <path d="M78 104 Q100 94 122 104 Q118 118 100 120 Q82 118 78 104 Z" fill="#1a2433"/>
    <!-- cordones -->
    <path d="M92 118 L90 136 M108 118 L110 136" stroke="#ff9900" stroke-width="3" stroke-linecap="round"/>
    <!-- bolsillo -->
    <path d="M78 158 L122 158 L116 178 L84 178 Z" fill="#1a2433"/>
    <!-- logo AWS en el pecho -->
    <text x="100" y="146" text-anchor="middle" font-family="Arial, sans-serif"
          font-size="20" font-weight="900" fill="#fff">aws</text>
    <path d="M82 152 Q100 162 118 152 M114 150 L120 152 L116 157"
          stroke="#ff9900" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- patitas -->
    <path d="M84 194 L84 212 M116 194 L116 212" stroke="#2b2b2b" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="84" cy="218" rx="11" ry="7" fill="#ff9900"/>
    <ellipse cx="116" cy="218" rx="11" ry="7" fill="#ff9900"/>
  </svg>

  <div id="aviso" class="aviso"></div>

  <form id="formulario">
    <textarea id="texto" maxlength="{{ max_caracteres }}"
              placeholder="Escribe tu mensaje aquí… aparecerá en la pantalla 🖥️"></textarea>
    <div class="contador"><span id="cuenta">0</span>/{{ max_caracteres }}</div>
    <button id="boton" type="submit">Enviar mensaje 🐝</button>
  </form>

  <footer>AWS Students Builder · CUUT · UAEMex</footer>

<script>
(() => {
  const MAX = {{ max_caracteres }};
  const form = document.getElementById("formulario");
  const texto = document.getElementById("texto");
  const cuenta = document.getElementById("cuenta");
  const boton = document.getElementById("boton");
  const aviso = document.getElementById("aviso");
  let temporizador = null;

  texto.addEventListener("input", () => {
    cuenta.textContent = texto.value.length;
    cuenta.parentElement.classList.toggle("limite", texto.value.length >= MAX);
  });

  function mostrarAviso(msj, tipo) {
    aviso.textContent = msj;
    aviso.className = "aviso " + tipo;
  }

  function iniciarCooldown(segundos) {
    clearInterval(temporizador);
    let restante = segundos;
    boton.disabled = true;
    boton.textContent = `Espera ${restante} s…`;
    temporizador = setInterval(() => {
      restante--;
      if (restante <= 0) {
        clearInterval(temporizador);
        boton.disabled = false;
        boton.textContent = "Enviar mensaje 🐝";
      } else {
        boton.textContent = `Espera ${restante} s…`;
      }
    }, 1000);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    boton.disabled = true;
    try {
      const r = await fetch("/api/mensaje", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: texto.value }),
      });
      const datos = await r.json();
      if (r.ok) {
        mostrarAviso(datos.mensaje, "ok");
        texto.value = "";
        cuenta.textContent = "0";
        iniciarCooldown(10);
      } else if (r.status === 429) {
        mostrarAviso(datos.mensaje, "error");
        iniciarCooldown(datos.restante || 10);
      } else {
        mostrarAviso(datos.mensaje, "error");
        // Groserías también consumen cooldown
        if (datos.error === "groseria") iniciarCooldown(10);
        else boton.disabled = false;
      }
    } catch {
      mostrarAviso("No se pudo enviar. Revisa tu conexión e intenta de nuevo.", "error");
      boton.disabled = false;
    }
  });
})();
</script>
</body>
</html>
